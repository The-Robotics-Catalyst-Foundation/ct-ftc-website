services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
  pocketbase:
    build:
      context: .
      dockerfile: Pbdockerfile
      args:
        PB_VERSION: 0.38.1
    container_name: ct-ftc-pocketbase
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
      TZ: America/New_York
    env_file: .env
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
      - pocketbase_hooks:/pb_hooks
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
volumes:
  pocketbase_data:
  pocketbase_public:
  pocketbase_hooks:
